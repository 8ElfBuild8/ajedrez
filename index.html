<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>App de Ajedrez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body>
    <div class="app">
        <aside id="controls">
            <div class="logo">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden>
                  <path d="M3 21h18" stroke="#4b2e05" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M7 21s2-6 6-6 6 6 6 6" stroke="#4b2e05" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 10s1-4 4-4 4 4 4 4v3" stroke="#4b2e05" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>App de Ajedrez</h1>
            </div>
            <p class="lead">Mueve las piezas deslizando.</p>
            <div class="controls-row">
                <button id="newBtn" class="btn">Nueva partida</button>
                <button id="undoBtn" class="btn secondary">Deshacer</button>
                <button id="flipBtn" class="btn secondary">Voltear</button>
            </div>
            <label class="vscheckbox"><input type="checkbox" id="vsComputer"> Jugar contra IA</label>
            <div id="status">Estado del juego...</div>
        </aside>
        <main>
            <div id="board"></div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
